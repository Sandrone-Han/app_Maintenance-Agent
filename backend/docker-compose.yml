services:
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: maintenance-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle_sys_password
      APP_USER: maintenance
      APP_USER_PASSWORD: maintenance_pwd
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  oracle-data: